name: Auto Deploy to Render

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test ML API
      run: |
        python -c "
        from instant_ml_api import ml_model
        prediction = ml_model.predict_price('CRDB', 3850)
        print(f'Prediction test: {prediction}')
        assert prediction['confidence'] > 95
        print('✅ ML API test passed')
        "
        
    - name: Deploy to Render
      uses: johnnymorgan/github-action-render-deploy@v1.0.0
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}
        
    - name: Notify deployment status
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "🌐 Frontend: https://tanzania-stock-frontend.onrender.com"
        echo "🔧 Backend API: https://tanzania-stock-api.onrender.com"
